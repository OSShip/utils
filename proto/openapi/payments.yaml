openapi: 3.1.0
info:
  title: OSShip Payments API
  version: 1.0.0
paths:
  /checkout:
    post:
      summary: Create Stripe Checkout session (Connect destination charge when mentor onboarded)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [listing_id, student_id, mentor_id, enrollment_id, amount_cents, success_url, cancel_url]
              properties:
                listing_id: { type: string, format: uuid }
                student_id: { type: string, format: uuid }
                mentor_id: { type: string, format: uuid }
                enrollment_id: { type: string, format: uuid }
                amount_cents: { type: integer }
                success_url: { type: string, format: uri }
                cancel_url: { type: string, format: uri }
      responses:
        '200':
          description: Checkout session created
  /webhooks/stripe:
    post:
      summary: Stripe webhook (idempotent ledger + enrollment activation)
  /ledger/{listingId}:
    get:
      summary: Ledger entries for a listing (auth required)
  /payout-summary:
    get:
      summary: Public anonymized payout aggregates
  /connect/onboard:
    post:
      summary: Start Stripe Connect Express onboarding for mentor
  /connect/status:
    get:
      summary: Mentor Stripe Connect status
